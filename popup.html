<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 272px;
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    background: #141414;
    color: #e5e0d8;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header svg { flex-shrink: 0; }
  .header h1 { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .count { margin-left: auto; font-size: 11px; color: #555; }

  /* Mode toggle */
  .mode-bar {
    padding: 0 12px 10px;
    display: flex;
    gap: 4px;
  }
  .mode-btn {
    flex: 1; padding: 6px 0; font-size: 11px; font-weight: 500;
    border: 1px solid transparent; border-radius: 6px;
    background: transparent; color: #555; cursor: pointer;
    text-align: center; font-family: inherit;
    transition: all 0.15s;
  }
  .mode-btn:hover { color: #888; }
  .mode-btn.active {
    border-color: #2a2a2a; color: #e5e0d8; background: #1a1a1a;
  }

  /* Divider */
  .divider { height: 1px; background: #1e1e1e; }

  /* Project list */
  #projects {
    max-height: 320px;
    overflow-y: auto;
    padding: 4px 0;
  }
  #projects::-webkit-scrollbar { width: 4px; }
  #projects::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  .project {
    padding: 9px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.1s;
    border-radius: 0;
  }
  .project:hover { background: #1a1a1a; }
  .project:active { background: #222; }
  .project .icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #d4a574;
    font-weight: 600;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .project .info { flex: 1; min-width: 0; }
  .project .name {
    font-weight: 500; font-size: 13px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .project .path {
    font-size: 10px; color: #444; margin-top: 1px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .project .ago {
    font-size: 11px; color: #444; flex-shrink: 0;
  }

  /* Messages */
  .msg {
    padding: 28px 20px;
    text-align: center;
    font-size: 12px;
    color: #555;
    line-height: 1.6;
  }
  .msg code {
    display: block;
    margin-top: 10px;
    padding: 8px 12px;
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 6px;
    font-size: 11px;
    color: #888;
    word-break: break-all;
    font-family: "SF Mono", Menlo, monospace;
  }

  /* Result */
  .result { padding: 24px 16px; text-align: center; }
  .result .check {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(34, 197, 94, 0.1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }
  .result .check svg { width: 18px; height: 18px; }
  .result .label { font-size: 13px; font-weight: 500; color: #e5e0d8; }
  .result .detail { font-size: 11px; color: #555; margin-top: 3px; }
  .result.err .label { color: #ef4444; }
</style>
</head>
<body>
  <div class="header">
    <svg width="16" height="16" viewBox="0 0 128 128">
      <path d="M30 98 L98 64 L30 30 L30 56 L66 64 L30 72 Z" fill="#d4a574"/>
    </svg>
    <h1>Send to Claude Code</h1>
    <span class="count" id="count"></span>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" id="btn-page">Full page</button>
    <button class="mode-btn" id="btn-sel">Selection</button>
  </div>
  <div class="divider"></div>
  <div id="content"><div class="msg">Loading...</div></div>
  <script src="popup.js"></script>
</body>
</html>
