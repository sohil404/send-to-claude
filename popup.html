<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 240px;
    font-family: -apple-system, system-ui, sans-serif;
    background: #141414;
    color: #e5e0d8;
    font-size: 13px;
  }
  .actions { padding: 8px; }
  button {
    width: 100%;
    padding: 11px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1e1e1e;
    color: #e5e0d8;
    transition: background 0.1s;
  }
  button + button { margin-top: 4px; }
  button:hover { background: #2a2a2a; }
  button:active { background: #333; }
  .icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
  .result {
    padding: 18px 16px;
    text-align: center;
  }
  .result .check { font-size: 22px; color: #22c55e; }
  .result .msg { margin-top: 3px; font-size: 13px; color: #22c55e; }
  .result .detail { font-size: 11px; color: #555; margin-top: 4px; }
  .result.err .msg { color: #ef4444; font-size: 12px; }
</style>
</head>
<body>
  <div id="content">
    <div class="actions">
      <button id="btn-page">
        <span class="icon">&#9633;</span>
        <span>Send full page</span>
      </button>
      <button id="btn-selection">
        <span class="icon">&#9998;</span>
        <span>Send selection</span>
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
